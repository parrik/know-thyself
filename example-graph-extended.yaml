# ── Antipatterns — failure modes Alex watches for in herself ──────────────────

- id: R16-antipattern-list-for-lists-sake
  type: reference
  name: "Antipattern: commissioning to fill the list"
  statement: |
    Signing a book because the list needs a spring-slot filler,
    not because it is the best book the Press could publish.
    Tempting for new directors wanting early wins. Alex has done
    it twice in fifteen years and regretted both.
  provenance:
    attribution: { source: "Standard editorial failure mode, Alex-acknowledged" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

- id: R17-antipattern-trend-chasing
  type: reference
  name: "Antipattern: acquisitions that chase an academic trend"
  statement: |
    By the time a trend is legible enough to chase, it is too late.
    The books that define a field come from people who were writing
    against or to one side of the current wave. Alex's default
    stance; worth naming because it can flip under pressure.
  provenance:
    attribution: { source: "Editorial folk wisdom" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

- id: R18-antipattern-skip-external-review
  type: reference
  name: "Antipattern: skipping external peer review to move fast"
  statement: |
    Tempting when the author is known, the argument is clean, and
    the season is compressed. But the skip is invisible at sign
    time and expensive at publication. Non-negotiable floor at
    UChicago: 2 external reviews per book.
  provenance:
    attribution: { source: "UChicago house rule + Alex's practice" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

# ──────────────────────────────────────────────────────────────────────────────
#  OBSERVATIONS — specific episodes
# ──────────────────────────────────────────────────────────────────────────────

- id: O01-first-three-months
  type: observation
  name: "First three months in Chicago — Sep–Nov 2024"
  statement: |
    Sep–Nov 2024. The hardest stretch since Helen's death in 2007.
    Ramping on a list inherited mid-cycle from her predecessor Rachel
    Liebowitz (retired June 2024), 50+ hour weeks, two author dinners
    per week, navigating UChicago editorial politics. Mira fell in
    with a group at Kenwood Alex couldn't read and Q1 grades dropped
    from A/B to C/D. No friends yet in Chicago. Running stopped —
    had been 25 miles/week along the Brooklyn waterfront for six
    years. Sleep <6 hours most weeknights. Drinking rose to 12–14/
    week. One specific night, Oct 19, Mira asked Alex something at
    dinner and Alex realized she had not heard the first half of the
    sentence.
  provenance:
    attribution: { source: "Alex, self-report", date: "2024-12" }
    evidence: { type: self-report }
    derivation: { from: [R04-move], method: "direct" }

- id: O02-running-group
  type: observation
  name: "Joined Chicago Lakefront Sunday Runners — December 2024"
  statement: |
    Dec 8 2024. Joined a Strava-linked Sunday morning group that
    meets at 8am at the 57th Street beach house and runs the
    Lakefront Trail — typical loop 8 miles. First two weeks felt
    forced. By week four, regular conversation with Priya Menon
    (radiologist, UChicago Medicine) and Marcus Okafor (partner at
    a small architecture firm). Routine restarted around the
    social anchor, not around willpower — and Alex has noticed
    that when Priya travels, her own adherence drops the week
    after.
  provenance:
    attribution: { source: "Alex, self-report", date: "2025-01" }
    evidence: { type: self-report }
    derivation: { from: [O01-first-three-months], method: "direct; causal relation to prior state" }

- id: O03-therapist-referral
  type: observation
  name: "Started weekly therapy — February 2025"
  statement: |
    Feb 2025. Referred by Priya to a cognitive-analytic therapist in
    Hyde Park, Dr. Ana Rivera. Weekly 50-minute sessions. Alex's
    framing as of May: "mostly noticing patterns in how I react, not
    unpacking history." Pays $180/session out of pocket after the
    UChicago plan's 12/year run out. Has not raised: Helen (R05),
    the affair in 2020–2021 (O06), the drinking uptick (R06).
    HANDLING: Alex is private about session content. Do not ask
    about specifics unless Alex raises them.
  provenance:
    attribution: { source: "Alex, self-report", date: "2025-05" }
    evidence: { type: self-report }
    derivation: { from: [], method: "direct" }

- id: O04-daughter-grades-recovered
  type: observation
  name: "Mira's grades recovered — spring 2025"
  statement: |
    Q3 grades (April 2025): back to A/B across five subjects. Alex
    attributes the recovery to (a) Ms. Okonkwo, Mira's AP Lang
    teacher, who ran an after-school writing group Mira joined in
    February, and (b) the household stabilizing as Alex's own
    routine came back. Mira, in passing: "It's easier when you're
    not weird in the mornings."
  provenance:
    attribution: { source: "Alex, self-report + Q3 report card", date: "2025-05" }
    evidence: { type: external-record }
    derivation: { from: [R03-family, R04-move], method: "direct" }

- id: O05-workplace-conflict
  type: observation
  name: "Acquisitions conflict with David Ferraro — March 2025"
  statement: |
    March 11 2025. Editorial committee meeting. David Ferraro
    (senior acquisitions, philosophy, 22 years at the Press) argued
    against Alex's proposal to commission a first book from Amara
    Chen (assistant professor, Northwestern, philosophy of climate
    modeling). Alex held the position, brought the rest of the
    committee around over two weeks, contract went out April 3.
    David has been formal-polite since. Alex's description:
    "stretched but not wrong." She has not initiated a repair
    conversation and probably will not.
  provenance:
    attribution: { source: "Alex, self-report", date: "2025-04" }
    evidence: { type: self-report }
    derivation: { from: [R02-career], method: "direct" }

- id: O06-post-divorce-affair
  type: observation
  name: "Brief affair with an OUP author, 2020–2021"
  statement: |
    Mar 2020–Jul 2021. Eighteen-month relationship with a philosopher
    Alex was editing — began shortly after the divorce finalized,
    ended when Alex became concerned about professional entanglement
    and ended it by email (which she does not consider herself
    proud of). The author's book was published in 2022 through a
    different editor at OUP. Alex has not told her therapist (O03)
    or anyone at UChicago. Surfaced here because it is load-bearing
    for interpretations about emotional processing (see N02) and
    for the general avoidance pattern (P03).
    HANDLING: do not raise unprompted. If Alex raises, match register.
  provenance:
    attribution: { source: "Alex, self-report, offhand Feb 2025" }
    evidence: { type: self-report }
    derivation: { from: [R03-family], method: "direct" }

- id: O07-kitchen-dinners
  type: observation
  name: "Monthly author dinners at the Hyde Park house"
  statement: |
    Since Jan 2025, roughly one Friday/month, Alex hosts 4–6 UChicago
    authors + series editors at her house. Cooks (Lebanese-inflected,
    from her mother's side), pours generously, keeps conversation
    running until midnight. Several authors have said the best
    editorial conversations of their book happened at that table.
    She does not track it as "networking"; it is closer to a
    practice. Mira usually eats upstairs.
  provenance:
    attribution: { source: "Alex, self-report + one author's book acknowledgements (J. Tanaka, forthcoming UChicago)", date: "2025-05" }
    evidence: { type: external-record }
    derivation: { from: [R02-career, R04-move], method: "direct" }

- id: O08-correspondence-discipline
  type: observation
  name: "Fifteen-year letter correspondence with three authors"
  statement: |
    Since ~2010, Alex has maintained handwritten-letter correspondence
    (paper, stamped, 2–4 pages) with three authors she edited early
    at OUP: a poet in Iowa, a philosopher in Edinburgh, a historian
    in Cape Town. ~6 letters/year each. The habit is closed — she
    has added no one to the circle since 2014. When she is running
    behind elsewhere, this is the thing that does not slip.
  provenance:
    attribution: { source: "Alex, self-report", date: "2025-03" }
    evidence: { type: self-report }
    derivation: { from: [R02-career], method: "direct" }

# ──────────────────────────────────────────────────────────────────────────────
#  OVERLAPS — patterns grounded by 2+ independent episodes
# ──────────────────────────────────────────────────────────────────────────────

- id: P01-routine-as-regulation
  type: overlap
  name: "Physical routine is load-bearing for Alex's stability"
  statement: |
    When Alex's running + sleep routine breaks, other things
    deteriorate proportionally — work hours extend, responsiveness
    to Mira drops, drinking rises, mood lowers. When the routine
    returns, these stabilize. Not preference — appears structural.
    Three independent episodes so far; the drinking uptick (R06)
    adds a fourth corroborating axis.
  provenance:
    attribution: { source: "Pattern across episodes" }
    evidence:
      type: pattern-across-cases
      references: [O01-first-three-months, O02-running-group, O04-daughter-grades-recovered, R06-substances]
      description: "Routine-breakdown Sep–Nov produced overwhelm; routine-restart Dec produced return to baseline; Mira's Q3 recovery coincided with Alex's routine re-establishing; drinking tracked routine state"
    derivation:
      from: [O01-first-three-months, O02-running-group, O04-daughter-grades-recovered, R06-substances]
      method: "induction across independent instances"

- id: P02-holds-positions-in-work
  type: overlap
  name: "Alex holds positions in work even when costly"
  statement: |
    In editorial contexts, Alex will hold a minority position and
    persuade toward it rather than yield for social ease. Positive
    outcomes (Chen contract, earlier OUP acquisitions) and recurring
    costs (cooled relationships with overruled colleagues — Ferraro
    being the current instance).
  provenance:
    attribution: { source: "Pattern across episodes" }
    evidence:
      type: pattern-across-cases
      references: [R02-career, O05-workplace-conflict]
      description: "March 2025 (Ferraro/Chen) is one detailed instance; R02 references at least two similar stretches at OUP (2016, 2021) Alex has described in passing"
    derivation:
      from: [R02-career, O05-workplace-conflict]
      method: "induction; note: only two episodes detailed — promotion to overlap is marginal"

- id: P03-interpretive-depth-emotional-distance
  type: overlap
  name: "Interpretive depth + emotional distance — toward self and others"
  statement: |
    A pattern of going extremely deep on interpretation (of
    manuscripts, of situations) while maintaining a specific kind
    of personal distance from feeling. Visible across: how she
    handles the Ferraro conflict (no repair), how she ended the
    2020–2021 affair (by email), how she frames therapy (pattern-
    finding, not processing), what she hasn't raised with her
    therapist (Helen, the affair, the drinking). Not denial —
    more like a policy. Generative for editing work; costly for
    relationships where the other party needs her present as
    feeling-first.
  provenance:
    attribution: { source: "Pattern across episodes" }
    evidence:
      type: pattern-across-cases
      references: [O03-therapist-referral, O05-workplace-conflict, O06-post-divorce-affair]
      description: "Three independent instances of the same shape — interpretive acuity, emotional distance"
    derivation:
      from: [O03-therapist-referral, O05-workplace-conflict, O06-post-divorce-affair]
      method: "induction across independent instances"

# ──────────────────────────────────────────────────────────────────────────────
#  NOVEL — single-derivation interpretations. TENTATIVE.
# ──────────────────────────────────────────────────────────────────────────────

- id: N01-isolation-is-early-warning
  type: novel
  tentative: true
  name: "Isolation is an early-warning signal, not a neutral state"
  statement: |
    PROPOSED: extended periods without meaningful social contact
    don't feel neutral to Alex — they appear upstream of physical-
    routine breakdown. Sep–Nov 2024 is the clearest case; the
    running-group restart suggests a social anchor (not willpower)
    was what let the routine return. The fact that Alex's adherence
    drops when Priya travels (O02 detail) is a second micro-
    corroboration but not yet independent enough to promote.
  provenance:
    attribution: { source: "Surfaced May 2025" }
    evidence:
      type: derived-inference
      description: "One detailed episode (O01) + the shape of the O02 recovery + Priya-travel detail"
      references: [O01-first-three-months, O02-running-group]
    derivation:
      from: [O01-first-three-months]
      method: "inductive from one case, with O02 suggesting mechanism"
  caveats: |
    Could be wrong:
    (1) O01 conflates isolation with several other changes (new job,
        Mira's struggles, the move, comp bump absorbing attention).
        Isolation may not be the driver.
    (2) Only one detailed episode; needs a second independent case.
    (3) Alex may be describing a general difficult stretch with
        isolation as a coincident rather than causal feature.

- id: N02-therapy-as-pattern-finding
  type: novel
  tentative: true
  name: "Therapy is functioning as pattern-finding, not emotional processing"
  statement: |
    PROPOSED: Alex's framing ("noticing patterns in how I react")
    suggests the therapy is being used primarily as a cognitive
    tool for self-observation rather than as emotional processing
    of specific events (divorce, Helen's death, the 2020 affair,
    the drinking uptick). This may be appropriate for stage; it
