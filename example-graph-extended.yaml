- id: R19-perimenopause
  type: reference
  name: "Perimenopausal signs beginning — late 2024"
  statement: |
    Cycles went from predictable 28-day through 2023 to irregular
    (24–38 days) across late 2024. Sleep fragmented in the Sep–Nov
    stretch in a way that did not fully resolve when the routine
    returned in December — 3–4am wakings 2–3 nights/week, hot at
    the collarbone, back to sleep in 20 minutes. Discussed once with
    her internist in Brooklyn (Dec 2024 phone appointment before
    the Chicago PCP transfer), who used the word "perimenopause"
    and noted Alex is within the typical 44–47 onset window. Alex
    has not scheduled the follow-up. She has a mind she has a
    vocabulary for; the body is a thing that is happening to her.
  provenance:
    attribution: { source: "Alex, self-report, offhand Mar 2025" }
    evidence: { type: self-report }
    derivation: { from: [], method: "direct" }

- id: R20-lump-biopsy
  type: reference
  name: "Breast lump found + biopsied clear, April 2021"
  statement: |
    Self-exam in the shower, April 2021, Brooklyn. Small, mobile,
    left breast upper-outer quadrant. Radiologist at Weill Cornell
    ordered ultrasound within the week; fine-needle biopsy two weeks
    later; benign fibroadenoma. Alex told no one except Daniel (at
    the time, newly co-parenting) and her mother. Still thinks about
    it — she notes the anniversary quietly, not the clear result.
    The two weeks of waiting produced a specific thought she has
    not repeated aloud: the sentence she would want to say to Mira
    if it went the other way. She has never written it down.
  provenance:
    attribution: { source: "Alex, self-report, raised once Jan 2025" }
    evidence: { type: self-report }
    derivation: { from: [], method: "direct" }

