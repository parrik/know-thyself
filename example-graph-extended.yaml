# ── Editorial lenses — canonical external frames Alex thinks with ─────────────

- id: R07-lens-kill-darlings
  type: reference
  name: "Lens: kill your darlings (Quiller-Couch, via Perkins)"
  statement: |
    "Murder your darlings." The discipline of cutting a beautiful
    sentence or passage when it does not serve the whole. Alex uses
    it editorially as first principle and applies it to life via
    PR03 (cut-the-forest).
  provenance:
    attribution: { source: "Arthur Quiller-Couch, On the Art of Writing (1914)" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

- id: R08-lens-iceberg
  type: reference
  name: "Lens: the iceberg theory (Hemingway)"
  statement: |
    Seven-eighths of a story is underwater; what is omitted
    strengthens what remains. Alex applies this to author bios
    in blurbs and to her own self-report style — both, arguably,
    to a fault (see P03 for the personal costs).
  provenance:
    attribution: { source: "Hemingway, Death in the Afternoon (1932)" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

- id: R09-lens-close-reading
  type: reference
  name: "Lens: close reading (New Criticism)"
  statement: |
    Read the sentence, not around it. Richards/Empson/Brooks
    tradition: the text is self-sufficient and rewards attention
    at word-and-phrase grain. Foundational to how Alex edits and
    to PR02 (one-sitting manuscript read).
  provenance:
    attribution: { source: "I. A. Richards, Practical Criticism (1929)" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

- id: R10-lens-reader-fills-gap
  type: reference
  name: "Lens: the reader's job is to fill the gap (Iser)"
  statement: |
    Reader-response theory. Meaning precipitates where text and
    reader meet; the text alone is insufficient. Alex uses this
    to resist over-editing — leaving the gaps that make the
    reader do work is often the right call.
  provenance:
    attribution: { source: "Wolfgang Iser, The Implied Reader (1974)" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

- id: R11-lens-structural-vs-line
  type: reference
  name: "Lens: structural ≠ line ≠ copy editing"
  statement: |
    Three levels with different interventions. Structural: does
    the argument work? Line: does each sentence do its job? Copy:
    is it correct? Conflating them produces bad editing — Alex's
    acquisitions context is mostly structural; the line work is
    hers by habit, not role.
  provenance:
    attribution: { source: "Standard publishing craft vocabulary" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

