- id: PR02-one-sitting-manuscript-read
  type: practice
  name: "Read every submitted manuscript in one sitting, pen in hand"
  statement: |
    Adopted from her mentor at FSG (Drenka Willen's habit, per Alex).
    Alex clears the desk, turns off the phone, reads the full
    submission at the dining table in one pass, marginal comments
    in pencil, structural notes in a blue-ruled notebook afterward.
    Typical duration 3–5 hours. Non-negotiable on Saturdays in
    commissioning season.
  provenance:
    attribution: { source: "Alex, self-articulated", date: "2025-01" }
    evidence:
      type: self-report
      references: [R02-career]
    derivation:
      from: [R02-career]
      method: "normative rule derived from career-long practice + stated inheritance"

- id: PR03-cut-the-forest
  type: practice
  name: "Cut the forest — monthly commitment review"
  statement: |
    Last Sunday of the month, 30 minutes at the kitchen table.
    List every active commitment (manuscripts, dinners, letters,
    committee seats, side reads). For each: does it serve the
    spine, or is it a beautiful sentence I am refusing to cut?
    Kill at least one thing per month. Bias toward yes-kill when
    uncertain — escalation of commitment (Alex's known weakness)
    pulls the other way. Direct application of R07 (kill your
    darlings) to life.
  provenance:
    attribution: { source: "Alex, self-articulated", date: "2025-02" }
    evidence:
      type: pattern-across-cases
      references: [R07-lens-kill-darlings, P03-interpretive-depth-emotional-distance]
    derivation:
      from: [R07-lens-kill-darlings]
      method: "editorial maxim transposed to life; hedge against commitment escalation"

- id: KT01-know-thyself
  type: practice
  name: "Know-thyself — edit the self as a manuscript"
  statement: |
    Meta-practice: use the schema of editing on the life. Read
    the months the way one reads a submission: what is the spine?
    What is load-bearing? What is a beautiful sentence that does
    not serve? Where are the novels I am quietly treating as
    overlaps? Where are the open questions I have been answering
    with plausible interpretations? Done roughly twice a year in
    a long walk along the Lakefront. This node and the graph it
    points to ARE the instrument.
