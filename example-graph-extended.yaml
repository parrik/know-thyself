- id: R32-orioles-crossword
  type: reference
  name: "One Orioles game a week; Saturday crossword in pencil"
  statement: |
    Watches one Orioles game a week because her father watches
    them — MASN on the laptop, usually Friday night, sometimes
    on DVR Saturday. She cannot explain the rules of the infield
    fly rule but knows every player on the 2014 AL East roster.
    Does the NYT Saturday crossword in pencil, no Google. Will
    take four days for a Saturday and not finish rather than look
    up a single answer. A specific kind of honor code about
    difficulty.
