# ==============================================================================
# example-graph.yaml — a worked example demonstrating the schema
#
# Persona: Alex Navarro, 44, senior editor. Composite/fictional — but shaped
# from the real texture of editors at university presses and trade houses
# (Oxford, UChicago, FSG, Knopf, Princeton). Named companies and places are
# real. Any similarity to a specific person at any of the institutions is
# coincidental.
#
# Summary: Alex moved from New York to Chicago in August 2024 for a director-
# level acquisitions role at the University of Chicago Press, after fifteen
# years at Oxford University Press. She is the primary parent for a 14-year-
# old daughter, Mira. Her ex-partner stayed in Brooklyn.
#
# She is competent, stubborn, generous with authors, and avoidant about
# herself. The graph documents both — including the parts she wouldn't
# bring up unprompted. That is the test of a useful graph.
# ==============================================================================

# ──────────────────────────────────────────────────────────────────────────────
#  NOW — the orienting pointer. Read this first.
# ──────────────────────────────────────────────────────────────────────────────

- id: NOW
  type: now
  name: "NOW — current moves (May 2025)"
  statement: |
    Read this first. Everything else is context for what's here.

    ## Frame
    Nine months into Chicago. Not "settling in" any more — at the point
    where the routine has returned (O02, PR01), the child is stable
    (O04, E01), the list is Alex's own (O05 locked the Chen book), and
    the next question is whether any of this is durable or whether it
    depends on conditions Alex has not named.

    ## This week
      • Chen manuscript first-pass edit — due back to author Fri.
      • External-reviewer invitations for two fall books (Sat session,
        PR02 protected).
      • Friday dinner: Priya, Marcus, two authors (O07).
      • Sunday run: non-negotiable 8am (PR01).

    ## This month (May 2025)
      • Decide whether to write Daniel about summer custody (OQ02).
        Not doing this is itself a decision.
      • Raise Helen (R05) OR the drinking uptick (R06) with Dr. Rivera
        within four sessions. Not both at once. Flip a coin if stuck.
      • Don't start a third David-Ferraro-type fight until the Chen
        contract publishes. P02 is real; the political budget is finite.

    ## This quarter
      • Answer OQ01 (Chicago 2-3 years vs permanent) by end of Q3.
        Downstream is too many unanswered dependencies.
      • First corroborating case for N01 or it stays novel indefinitely.
      • Decide whether OQ03 (P03 sustainability) is a live question or
        a made-up one. The Chen book acknowledgements in 18 months
        will either make it obvious or dissolve it.

    ## Standing rules
      • Sunday run protected (PR01).
      • Manuscripts in one sitting (PR02).
      • Cut the forest monthly (PR03 — review and kill commitments
        not serving the spine).
      • Letters to the three authors on schedule (O08).
      • Drinking: cap at 6/week. Over 8/week = canary (see N01 shape).

    ## Canaries — watch for
      • Missed Sunday run for 2 consecutive weeks without replacement
        → routine is breaking (P01 failure mode from O01).
      • Drinking back above 10/week → O01 shape returning.
      • Mira stops initiating conversation in the mornings → N01's
        downstream showing up again.
      • Political cost of P02 exceeding single-conflict per quarter →
        OQ03 getting acute.
      • Stopped writing the three letters (O08) → distance is winning.
  provenance:
    attribution: { source: "Alex, self-articulated", date: "2025-05" }
    evidence: { type: self-report }
    derivation: { from: [], method: "direct" }

