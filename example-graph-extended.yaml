- id: R06-substances
  type: reference
  name: "Substance-use history"
  statement: |
    Heavy smoker 2005–2013 (peak ~15/day at FSG and early OUP); quit
    cold turkey 2013 after a pneumonia episode. Occasional cigarette
    at book-launch parties since (3–5/year, self-reported). Drinking:
    moderate through the marriage (3–5 drinks/week), rose post-
    divorce, sat around 8/week through 2023, spiked to 12–14/week in
    the Sep–Nov 2024 stretch (O01), back to ~6/week by April 2025.
    Alex tracks this herself; has not brought it to therapy as of
