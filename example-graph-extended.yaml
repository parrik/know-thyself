- id: P06-holds-grudges
  type: overlap
  name: "Alex holds grudges longer than she admits"
  statement: |
    A single pattern visible across multiple domains. Her
    predecessor Rachel Liebowitz's retirement announcement:
    polite, unwarm — there is a 2020 committee vote Alex has
    never mentioned but remembers. The Ferraro conflict (O05)
