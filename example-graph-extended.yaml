    about Mira three times in twenty minutes. Alex has not been
    to Rhinebeck since August 2024 — nine months. She last missed
    this long in 2006 (college senior year). Mother (74) calls
    every Sunday 10am Central; Alex sometimes takes the call
    partway through a run, holding the phone against her ear while
    walking.
