- id: E08-forecast-5-year
  type: emergent
  inferencer: true
  horizon: 5-year
  name: "5-year forecast (through May 2030)"
  statement: |
    By May 2030:
    • Mira is 19, in college somewhere — probably East Coast,
      given R28 (aging father, grandmother calls), R26 (Nadia in
      Boston), and residual Brooklyn weight. If Mira is in
      Chicago, OQ01 has resolved toward permanent.
    • Alex is 49. Perimenopause fully landed (R19). R22
      (pulmonology followup) either completed or
      consequential-or-dismissed. R21 (back) likely worse; she
      will have had either the MRI she has avoided since 2019 or
      a much more constrained running routine.
    • Father has either declined significantly or died. The
      distance from Rhinebeck (R28) becomes acute in one
      direction or resolves in the other.
    • OQ04 either resolved (partner, or explicit "the editorial
      intimacy is enough and I'm at peace with that") or still
