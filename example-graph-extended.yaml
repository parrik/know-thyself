- id: N05-move-was-grief-shaped
  type: novel
  tentative: true
  name: "The Chicago move was grief-shaped, not opportunity-shaped"
  statement: |
    PROPOSED: the Helen loss (R05, September 2007), the twenty-
    year dormancy in which the loss was never directly processed,
    and the August 2024 move — undertaken in a six-week decision
    window (R04), at the symbolic age of 44 (Helen would have
    been 47 in 2024, had she lived to Alex's current life stage),
    into a city where Alex knew no one — are plausibly a single
    shape rather than three independent events. The move
    accomplishes what direct grief-work has not: geographic
    distance from the Brooklyn years in which the loss sat
    unaddressed. The opportunity framing is real; the grief
    shape may be concurrent. Not mutually exclusive.
  provenance:
    attribution: { source: "Surfaced May 2025" }
    evidence:
      type: derived-inference
      references: [R04-move, R05-sister, N03-helen-structural-presence, O06-post-divorce-affair]
    derivation:
      from: [R04-move, R05-sister]
      method: "interpretive; single derivation, relies on timing coincidence"
  caveats: |
    Highly speculative. Alex has never framed it this way.
    Could be wrong: (1) the timing is a coincidence; Alex was
    47-at-Helen's-age-of-death would be a cleaner alignment and
    that is not what this claim rests on. (2) The opportunity
    framing is sufficient on its own — UChicago was a real
    career step. (3) Retrofitted-narrative risk is high. Do not
    propagate without Alex naming the connection herself. If
    she does, it becomes biographical, not stronger-evidenced.

- id: N06-mira-structurally-parental
  type: novel
  tentative: true
  name: "Mira has become structurally parental in small ways"
  statement: |
    PROPOSED: specific observed behaviors in Mira since the
    Sep–Nov 2024 stretch suggest a low-grade role-inversion —
    noticing Alex's drinking (a sidelong comment in December
    about "the wine schedule"), covering the Kenwood morning
    check-in registry on two days Alex overslept, asking Alex
    questions at dinner designed to check on Alex ("how did the
    Ferraro thing resolve?" — phrased like a peer). Mira's
    own line from O04 — "it's easier when you're not weird in
    the mornings" — reads in this frame as a parental sentence.
    Tentative because normal adolescent perceptiveness produces
    some of the same behavior.
  provenance:
    attribution: { source: "Surfaced May 2025" }
    evidence:
      type: derived-inference
      references: [O01-first-three-months, O04-daughter-grades-recovered, E01-child-stability-depends-on-alex-stability]
    derivation:
      from: [O01-first-three-months, O04-daughter-grades-recovered]
      method: "interpretive; pattern across small instances"
  caveats: |
    Fourteen-year-olds with a single attentive parent often
    pay close attention to that parent; the observed behavior
    is within the range of normal. The worry is shape, not
    quantity — if the shape is parental-inversion rather than
    perceptiveness, the intervention would be to reduce Mira's
    load-bearing role rather than to praise the maturity. Do
    not act on the novel reading without a second independent
    case. Do not raise with Mira unprompted.

