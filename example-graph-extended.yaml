- id: PR01-protect-sunday-run
  type: practice
  name: "Sunday 8–10am on the Lakefront Trail is protected"
  statement: |
    No work events, no family scheduling Sunday 8–10am. When travel
    conflicts, move the slot to Saturday same-time rather than skip.
    The routine is upstream of everything else and Mira's stability
    indexes off it — so protecting it is operational infrastructure,
    not self-indulgence.
  provenance:
