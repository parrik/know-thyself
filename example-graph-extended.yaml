  statement: |
    Mother's family was Episcopalian in a low-church Hudson Valley
    register; Alex was confirmed at 13 and stopped attending at
    17. No current practice. Has edited perhaps fifteen books in
    religious studies across the OUP years (R02), which produced
    a specific kind of ambivalence toward institutional religion
    that a purely secular person would not have — too informed to
    dismiss, too formed to belong. This affects editorial
    judgments in ways she can usually name and occasionally
    cannot.
