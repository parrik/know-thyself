- id: O11-passed-on-prizewinner
  type: observation
  name: "Book passed on in 2016 that went on to a major prize"
  statement: |
    April 2016, OUP. Alex declined a proposal from a first-time
    author (historian, trauma studies). Cited the argument's
    inability to stand without its central case study, which she
    judged unverifiable. The book was acquired by a competing
    press, published 2019, shortlisted for a major field prize
    2020, won a subsidiary prize. Alex's reasoning was defensible
    at the time and the final book did substantially address her
    concern in ways the proposal had not. She still thinks about
    it — not as "I was wrong" but as "I was right in a way that
    would have been wrong to act on for much longer." A specific
    epistemic scar.
  provenance:
    attribution: { source: "Alex, self-report, oblique Jan 2025" }
    evidence: { type: self-report }
    derivation: { from: [R02-career], method: "direct" }

- id: O12-inherited-author-third-book
  type: observation
  name: "An inherited OUP author whose third book could not be saved"
  statement: |
    Alex inherited an author (philosopher, continental, mid-career)
    when her predecessor at OUP retired in 2018. Edited his second
    book successfully (2019). His third manuscript arrived 2022
    with a structural problem Alex flagged immediately; two years
    of revision could not resolve it without dismantling the book's
    premise. Published 2024 to polite-weak reviews. Alex reads the
    reviews as her failure. The author does not — still writes her
    warmly. It is nonetheless the sore professional point from the
    OUP years.
  provenance:
    attribution: { source: "Alex, self-report, Feb 2025" }
    evidence: { type: self-report }
    derivation: { from: [R02-career, R11-lens-structural-vs-line], method: "direct" }

- id: R36-navarro-treatment
  type: reference
  name: "The \"Navarro treatment\" — signature editorial style"
  statement: |
    A specific editorial practice that has become known by name
    at both OUP and UChicago: the first 30 pages of a manuscript
    returned with dense marginalia in blue pencil (Mitsubishi
    Uni blue, specifically, bought in boxes of 12), followed by
    a structural memo (4–8 pages, double-spaced) rather than
    line edits beyond page 30. The signal to the author: the
    structural problem has to be solved before line work matters.
    Several authors have described receiving the packet as
    clarifying; one author described it, in a Publishers Weekly
    interview, as "the hardest week of my professional life and
    the best thing that has happened to the book." Alex is
    uncomfortable being named in this register and has declined
    an invitation to write about her process.
  provenance:
    attribution: { source: "Alex, self-report + Publishers Weekly profile of J. Tanaka (Mar 2024)" }
    evidence: { type: external-record }
    derivation: { from: [R02-career, R11-lens-structural-vs-line], method: "direct" }

- id: O13-reputation-for-no
  type: observation
  name: "Reputation for saying no quickly"
  statement: |
    Across OUP years Alex built a reputation at academic
    conferences as an editor who responds to pitches with a fast,
    clear no when the fit is wrong. Agents and scholars describe
    this as an asset — it saves them time. Several junior
    colleagues have described the same habit as brittle: the
    speed of "no" sometimes closes doors that deserved a second
    conversation. Both are true. Alex tracks this carefully and
    has not changed the practice.
  provenance:
    attribution: { source: "Alex, self-report + a 2023 OUP peer feedback note" }
    evidence: { type: external-record }
    derivation: { from: [R02-career], method: "direct" }

