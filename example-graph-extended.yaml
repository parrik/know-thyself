- id: N04-risk-corridor
  type: novel
  tentative: true
  name: "Risk corridor — low-probability, high-consequence scenarios"
  statement: |
    TENTATIVE. Five intersection readings where the graph would
    invert its current trajectory — each low-probability on its own,
    each high-consequence if it landed.

    1. **Mira crisis forces a return East.** An adolescent mental-
       health event, a social incident at Kenwood, or a sustained
       refusal — any of which could make the Chicago life
       unsustainable for reasons unrelated to Alex's work. Response
       capacity depends on Daniel being structurally available
       (OQ02), which is currently ambiguous.

    2. **UChicago Press leadership change removes autonomy.** A new
       director who wants a different list shape. Alex's P02
       (holding positions) under a leadership that doesn't back
       her would flip from asset to liability fast. Canary: a
       shift in who initiates the weekly acquisitions huddle.

    3. **The affair (O06) surfaces.** The ex-author publishes
       a novel that fictionalizes it, or mentions it in an
       interview. Alex is named or identifiable. Professional
       and personal exposure both. Low probability; not zero.
       Counter-move: Alex has told no one — the exposure surface
       is only the other party. Known.

    4. **R06 (drinking) crosses a visible line.** A missed
       dinner, a committee meeting badly handled, an incident
       Mira sees. The trajectory from 6/week → 14/week Sep–Nov
       happened once; it could happen again. Canary R13 is
       named; the question is whether Alex acts on it when
       isolated.

    5. **Helen-anniversary compounding event.** The September
       anniversary of Helen's death (R05) falls during the same
       stretch as the year's hardest editorial load. First time
       since Alex has been in Chicago. Unclear what this
       produces; the fact that N03 (Helen-structural-presence)
       has never been addressed directly makes the compounding
       scenario hard to predict.

    Each scenario is tentative because each requires a specific
    low-probability intersection. Single-observer (graph is
    read by model with Alex's framing). Flag for review.
  provenance:
    attribution: { source: "Surfaced May 2025" }
    evidence:
      type: derived-inference
      description: "Intersection readings at trajectory-inversion points"
      references: [OQ01-long-term-plan, OQ02-relationship-with-ex, R06-substances, R05-sister, O06-post-divorce-affair, P02-holds-positions-in-work]
    derivation:
      from: [OQ01-long-term-plan, OQ02-relationship-with-ex, R06-substances]
      method: "scenario synthesis across open questions + references"
  caveats: |
    Function of this node is NOT to predict. It is to be a
    benchmark against which surprise becomes visible. Each
    scenario has a named canary and a named counter-move where
    possible. Promote none of these to overlap without an actual
    instance — and if one lands, the graph's first job is
    triage, not prediction.

