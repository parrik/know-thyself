- id: PR05-phoneless-walk
  type: practice
  name: "One long walk per month without a phone"
  statement: |
    Once a month: a 2–3 hour walk alone with no phone and no
    manuscript. Usually the Hyde Park/Jackson Park loop with a
    coffee at the Point. Not editorial — the point is explicitly
    to be in a mode that is not interpretive. Direct hedge
    against P03 (interpretive depth + emotional distance). The
    measurement is whether the walk produces sentences she would
    not have produced at a desk; roughly half the time it does
    not, and that is considered the practice working.
