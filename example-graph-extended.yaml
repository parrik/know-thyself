- id: R01-origin
  type: reference
  name: "Grew up in Rhinebeck, NY — bookshop household"
  statement: |
    Born 1980. Raised in Rhinebeck, Hudson Valley (~7,500 people).
    Father a high-school English teacher; mother ran Montgomery Books
    on East Market Street (closed 2008, after the downturn). The
    household's center of gravity was books — evenings were reading
    aloud; the bookshop's backroom functioned as homework space.
    Left at 18 for Barnard (English, 2002).
  provenance:
    attribution: { source: "Alex, self-report", date: "2025" }
    evidence: { type: self-report }
    derivation: { from: [], method: "direct" }

- id: R02-career
  type: reference
  name: "Farrar, Straus → Oxford University Press (2005–2024)"
  statement: |
    Editorial assistant at Farrar, Straus and Giroux 2005–2009 under
    Jonathan Galassi's shop. Moved to Oxford University Press NYC 2009,
    starting on the trade religion list; moved into academic humanities
    acquisitions by 2015. Senior editor 2019–2024, commissioning ~8
    books/year in philosophy and religious studies. Known at OUP for
    a specific willingness to take first books from junior scholars
    where the prose carried, and for editing line-by-line in an era
    when most acquisitions editors had stopped.
  provenance:
    attribution: { source: "Alex, self-report + LinkedIn + OUP catalogue", date: "2025" }
    evidence: { type: external-record }
    derivation: { from: [], method: "direct" }

- id: R03-family
  type: reference
  name: "Single parent; daughter Mira (age 14)"
  statement: |
    Divorced 2019 after eleven years of marriage. Ex-partner Daniel
    (finance, Brooklyn). Primary caregiver for Mira (b. 2011).
    Custody agreement nominally shared; since divorce, Mira has
    been with Alex >90% of nights. Mira visits Daniel ~one weekend/
    month and two school breaks a year. Relationship with Daniel is
    civil, infrequent, channelled mostly through email.
  provenance:
    attribution: { source: "Alex, self-report", date: "2025" }
    evidence: { type: self-report }
    derivation: { from: [], method: "direct" }

- id: R04-move
  type: reference
  name: "Moved NYC → Chicago, August 2024"
  statement: |
    Relocated for a director-level role at University of Chicago Press,
    commissioning in philosophy and the history of science. Sold the
    Prospect Heights apartment (Brooklyn), bought a three-bedroom
    greystone in Hyde Park. Enrolled Mira at Kenwood Academy (CPS
    magnet, 4th in the district). Pay bump ~22%; cost-of-living
    dropped more; real income rose. The move was decided over six
    weeks; Mira was consulted but not consenting in any real sense.
  provenance:
    attribution: { source: "Alex, self-report", date: "2025" }
    evidence: { type: self-report }
    derivation: { from: [], method: "direct" }

- id: R05-sister
  type: reference
  name: "Older sister Helen — died 2007 (age 23)"
  statement: |
    Helen, older by three years. Killed at 23 in a single-car accident
    on Route 9G outside Rhinebeck, Sep 2007. BAC above the legal limit;
    Alex was 19 months into her first job in NYC at the time. Alex
    rarely brings her up directly. When she does, it is usually in the
    register of "my sister used to say —" rather than the register of
    grief. The detail matters because other nodes refer to it
