- id: R31-pleasure-reading
  type: reference
  name: "Two novels a month outside work; Bowen / Paley / Moore core"
  statement: |
    Alex reads two novels a month for pleasure — a rule she holds
    more faithfully than she holds the gym. Current rotation
    centers on Elizabeth Bowen (The Death of the Heart re-read
    every few years), Grace Paley, Lorrie Moore. Refuses to read
    contemporary fiction while actively editing it — tried in
    2024 (a Rachel Kushner novel, while editing a first-book
    novelist) and found her editorial instincts contaminating the
    reading. Pleasure-reading is protected as deliberately as the
    run. Bowen's specific gift — interiority that the narrator
    declines to name — is the one Alex has quietly been trying to
    learn since 2011.
